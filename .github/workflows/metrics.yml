name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Default GITHUB_TOKEN is enough for public-stat plugins. A PAT is only
          # needed for private-contribution counts or follower deep-dive — keeping
          # this workflow secret-free.
          token: ${{ secrets.GITHUB_TOKEN }}
          user: eksion
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Jakarta
          config_display: large
          repositories_affiliations: owner, collaborator, organization_member
          # Plugins (subset chosen for senior-eng signal — no trophies, no streak):
          plugin_languages: yes
          plugin_languages_ignored: html, tex, css, scss, less, cmake, makefile, dockerfile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_topics: yes
          plugin_topics_mode: mastered
          plugin_topics_limit: 12
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          # Commit back to the repo so the README can reference a local SVG —
          # no external service to fail.
          committer_message: "chore(metrics): refresh profile metrics"
          committer_branch: main
          output_action: commit
          filename: github-metrics.svg
